<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • Instagram</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    .ig-gradient { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
    .ig-gradient-text { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .input-focus:focus { outline: none; border-color: #a8a8a8; }
    .btn-send { transition: all 0.2s ease; }
    .btn-send:hover { opacity: 0.9; transform: scale(1.01); }
    .btn-send:active { transform: scale(0.98); }
    .btn-send:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .card-shadow { box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  </style>
</head>
<body class="min-h-screen bg-[#fafafa] flex items-center justify-center p-4">
  <!-- Background pattern -->
  <div class="fixed inset-0 bg-[linear-gradient(45deg,#fafafa_25%,transparent_25%),linear-gradient(-45deg,#fafafa_25%,transparent_25%),linear-gradient(45deg,transparent_75%,#fafafa_75%),linear-gradient(-45deg,transparent_75%,#fafafa_75%)] bg-[length:20px_20px] bg-[position:0_0,0_10px,10px_-10px,-10px_0px] opacity-60 pointer-events-none"></div>

  <main class="relative w-full max-w-[400px]">
    <!-- Login card -->
    <div class="bg-white rounded-xl border border-gray-200 card-shadow p-8 sm:p-10">
      <!-- Logo -->
      <div class="flex justify-center mb-8">
        <h1 class="text-3xl font-bold ig-gradient-text tracking-tight">Instagram</h1>
      </div>

      <!-- Form -->
      <form id="login-form" class="space-y-4">
        <div>
          <label for="email" class="sr-only">Gmail address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Gmail address"
            autocomplete="email"
            required
            class="w-full px-4 py-3 bg-[#fafafa] border border-gray-200 rounded-lg text-sm text-gray-900 placeholder-gray-400 input-focus transition-colors"
          />
          <p id="email-error" class="mt-1.5 text-xs text-red-500 hidden"></p>
        </div>

        <button
          type="submit"
          id="send-otp-btn"
          class="btn-send w-full py-3 rounded-lg text-white font-semibold text-sm ig-gradient disabled:opacity-60 disabled:cursor-not-allowed"
        >
          Send OTP
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-4 my-6">
        <span class="flex-1 h-px bg-gray-200"></span>
        <span class="text-xs text-gray-400 font-medium">OR</span>
        <span class="flex-1 h-px bg-gray-200"></span>
      </div>

      <!-- Footer links -->
      <p class="text-center text-xs text-gray-400">
        By continuing, you agree to our
        <a href="#" class="text-gray-600 hover:underline">Terms</a>
        and
        <a href="#" class="text-gray-600 hover:underline">Privacy Policy</a>.
      </p>
    </div>

    <!-- Sign up link -->
    <p class="mt-6 text-center text-sm text-gray-600">
      Don't have an account?
      <a href="#" class="font-semibold ig-gradient-text hover:opacity-80">Sign up</a>
    </p>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const sendOtpBtn = document.getElementById('send-otp-btn');
    const emailError = document.getElementById('email-error');

    function isValidEmail(value) {
      const re = /^[^\s@]+@gmail\.com$/i;
      return re.test(value);
    }

    function showError(message) {
      emailError.textContent = message;
      emailError.classList.remove('hidden');
      emailInput.classList.add('border-red-400');
    }

    function clearError() {
      emailError.textContent = '';
      emailError.classList.add('hidden');
      emailInput.classList.remove('border-red-400');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email = emailInput.value.trim();

      if (!email) {
        showError('Please enter your Gmail address.');
        return;
      }

      if (!isValidEmail(email)) {
        showError('Please enter a valid Gmail address (e.g. name@gmail.com).');
        return;
      }

      // Simulate OTP send
      sendOtpBtn.disabled = true;
      sendOtpBtn.textContent = 'Sending...';

      await new Promise((r) => setTimeout(r, 1200));

      sendOtpBtn.textContent = 'OTP Sent!';
      sendOtpBtn.classList.add('!bg-emerald-500', '!bg-none');

      setTimeout(() => {
        sendOtpBtn.disabled = false;
        sendOtpBtn.textContent = 'Send OTP';
        sendOtpBtn.classList.remove('!bg-emerald-500', '!bg-none');
      }, 2000);
    });

    emailInput.addEventListener('input', clearError);
  </script>
</body>
</html>
